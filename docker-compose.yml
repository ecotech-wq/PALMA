services:
  postgres:
    image: postgres:16-alpine
    container_name: ogc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ogc
      POSTGRES_USER: ogc
      POSTGRES_PASSWORD: ogc_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ogc -d ogc"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: ogc-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
